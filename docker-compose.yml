version: '3.8'

services:
  # ========================================
  # Banco de Dados PostgreSQL
  # ========================================
  db:
    image: postgres:16-alpine
    container_name: kard-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: kard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=pt_BR.UTF-8"
      TZ: America/Sao_Paulo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - kard-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kard"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ========================================
  # Aplicação Node.js
  # ========================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: kard-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/kard
      JWT_SECRET: sua_chave_secreta_muito_segura_aqui_minimo_32_caracteres_dev
      JWT_REFRESH_SECRET: sua_chave_refresh_secreta_muito_segura_aqui_minimo_32_caracteres_dev
      JWT_EXPIRES_IN: 1h
      JWT_REFRESH_EXPIRES_IN: 7d
      API_VERSION: 1.0.0
      CORS_ORIGIN: http://localhost:3000
      LOG_LEVEL: debug
      CACHE_TTL: 60000
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX_REQUESTS: 100
      MAX_FILE_SIZE: 10
      FRONTEND_URL: http://localhost:3000
      DEBUG_SQL: true
    ports:
      - "3000:3000"
    volumes:
      # Hot-reload: código fonte
      - ./src:/app/src:delegated
      - ./public:/app/public:delegated
      - ./tsconfig.json:/app/tsconfig.json:ro
      - ./package.json:/app/package.json:ro
      - ./package-lock.json:/app/package-lock.json:ro
      # Volumes para persistência
      - uploads_data:/app/uploads
      - logs_data:/app/logs
      - backups_data:/app/backups
      # Evitar sobrescrever node_modules
      - /app/node_modules
      - /app/dist
    networks:
      - kard-network
    command: npm run dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ========================================
  # Adminer (Gerenciador de BD - Opcional)
  # ========================================
  adminer:
    image: adminer:latest
    container_name: kard-adminer
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
      ADMINER_DESIGN: dracula
    networks:
      - kard-network

# ========================================
# Volumes Persistentes
# ========================================
volumes:
  postgres_data:
    driver: local
    name: kard-postgres-data
  uploads_data:
    driver: local
    name: kard-uploads-data
  logs_data:
    driver: local
    name: kard-logs-data
  backups_data:
    driver: local
    name: kard-backups-data

# ========================================
# Rede Customizada
# ========================================
networks:
  kard-network:
    driver: bridge
    name: kard-network