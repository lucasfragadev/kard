<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0">
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Redefina sua senha do Kard - Sistema inteligente de gerenciamento de atividades e tarefas. Crie uma nova senha de forma segura.">
    <meta name="keywords" content="redefinir senha, nova senha, segurança, kard, gerenciador de tarefas">
    <meta name="author" content="Kard">
    <meta name="robots" content="noindex, nofollow">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://kard.app/redefinir-senha.html">
    <meta property="og:title" content="Kard - Redefinir Senha | Gerenciador de Atividades">
    <meta property="og:description" content="Redefina sua senha do Kard de forma segura.">
    <meta property="og:image" content="https://kard.app/images/og-image.png">
    <meta property="og:locale" content="pt_BR">
    <meta property="og:site_name" content="Kard">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://kard.app/redefinir-senha.html">
    <meta property="twitter:title" content="Kard - Redefinir Senha | Gerenciador de Atividades">
    <meta property="twitter:description" content="Redefina sua senha do Kard de forma segura.">
    <meta property="twitter:image" content="https://kard.app/images/twitter-image.png">
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://kard.app/redefinir-senha.html">
    
    <title>Kard - Redefinir Senha | Gerenciador de Atividades</title>
    
    <!-- TailwindCSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gradient-to-br from-indigo-50 via-purple-50 to-pink-50 dark:from-slate-900 dark:via-slate-800 dark:to-slate-900 min-h-screen flex items-center justify-center p-4 transition-colors duration-300">
    <!-- Container Principal -->
    <div class="w-full max-w-md">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-8 border border-slate-200 dark:border-slate-700 transition-colors duration-300">
            <!-- Header -->
            <header class="text-center mb-8">
                <h1 class="text-3xl font-bold text-indigo-600 dark:text-indigo-400" role="banner">
                    Kard<span class="text-slate-800 dark:text-white">.</span>
                </h1>
                <h2 class="text-center text-slate-600 dark:text-slate-400 text-sm mt-2">
                    Redefinir Senha
                </h2>
            </header>

            <!-- Formulário -->
            <form id="reset-password-form" class="space-y-4" novalidate aria-labelledby="form-title">
                <div class="sr-only" id="form-title">Formulário de Redefinição de Senha</div>

                <!-- Nova Senha -->
                <div>
                    <label for="password" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">
                        Nova Senha
                    </label>
                    <div class="relative">
                        <input 
                            type="password" 
                            id="password" 
                            name="password"
                            placeholder="Digite sua nova senha (mín. 6 caracteres)" 
                            required
                            minlength="6"
                            class="w-full px-4 py-3 border border-slate-300 dark:border-slate-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 dark:bg-slate-700 dark:text-white transition-colors pr-12"
                            aria-describedby="password-help password-error"
                            aria-required="true"
                        />
                        <button 
                            type="button" 
                            onclick="togglePass('password', 'eye-icon-1')" 
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 rounded p-1"
                            aria-label="Mostrar/ocultar senha"
                            tabindex="-1">
                            <span id="eye-icon-1">👁️</span>
                        </button>
                    </div>
                    <span id="password-requirements" class="sr-only">A senha deve ter no mínimo 6 caracteres</span>
                    <span id="password-error" class="text-red-500 text-xs mt-1 hidden" role="alert"></span>
                </div>

                <!-- Confirmar Senha -->
                <div>
                    <label for="confirm-password" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">
                        Confirmar Nova Senha
                    </label>
                    <div class="relative">
                        <input 
                            type="password" 
                            id="confirm-password" 
                            name="confirm-password"
                            placeholder="Confirme sua nova senha" 
                            required
                            minlength="6"
                            class="w-full px-4 py-3 border border-slate-300 dark:border-slate-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 dark:bg-slate-700 dark:text-white transition-colors pr-12"
                            aria-describedby="confirm-password-error"
                            aria-required="true"
                        />
                        <button 
                            type="button" 
                            onclick="togglePass('confirm-password', 'eye-icon-2')" 
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 rounded p-1"
                            aria-label="Mostrar/ocultar confirmação de senha"
                            tabindex="-1">
                            <span id="eye-icon-2">👁️</span>
                        </button>
                    </div>
                    <span id="confirm-password-error" class="text-red-500 text-xs mt-1 hidden" role="alert"></span>
                </div>

                <!-- Botão de Submissão -->
                <button 
                    type="submit" 
                    class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-3 rounded-lg font-bold transition-all shadow-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2"
                    aria-label="Redefinir senha">
                    Redefinir Senha
                </button>

                <!-- Mensagem de Feedback -->
                <div 
                    id="message" 
                    class="text-sm mt-4 text-center hidden" 
                    role="alert" 
                    aria-live="polite"
                    aria-atomic="true">
                </div>
            </form>

            <!-- Footer -->
            <footer class="mt-6 text-center border-t border-slate-200 dark:border-slate-700 pt-6">
                <p class="text-slate-500 dark:text-slate-400 text-sm">Lembrou sua senha?</p>
                <a 
                    href="login.html" 
                    class="text-indigo-600 dark:text-indigo-400 hover:underline font-bold text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 rounded"
                    aria-label="Voltar para o login">
                    Fazer Login
                </a>
            </footer>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/reset-password.js"></script>
    <script src="js/theme.js"></script>
    <script>
        // Função para toggle de senha
        function togglePass(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = '🙈';
            } else {
                input.type = 'password';
                icon.textContent = '👁️';
            }
        }
    </script>
</body>
</html>
