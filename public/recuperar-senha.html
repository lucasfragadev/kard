<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0">
    
    <meta name="description" content="Recupere sua senha do Kard - Sistema inteligente de gerenciamento de atividades e tarefas. Recupere o acesso à sua conta de forma segura.">
    <meta name="keywords" content="recuperar senha, reset senha, kard">
    
    <meta property="og:url" content="https://kard-app.onrender.com/recuperar-senha.html">
    <meta property="og:title" content="Kard - Recuperar Senha">
    
    <meta name="twitter:url" content="https://kard-app.onrender.com/recuperar-senha.html">
    <meta name="twitter:title" content="Kard - Recuperar Senha">
    
    <link rel="canonical" href="https://kard-app.onrender.com/recuperar-senha.html">
    
    <title>Kard - Recuperar Senha | Gerenciador de Atividades</title>
    <link href="css/style.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-white to-purple-50 dark:from-slate-900 dark:via-slate-800 dark:to-slate-900 min-h-screen flex items-center justify-center p-4 transition-colors duration-300">
    <div class="w-full max-w-md">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-8 border border-slate-200 dark:border-slate-700 transition-colors duration-300">
            <h1 class="text-3xl font-bold text-center text-indigo-600 dark:text-indigo-400" role="banner">
                Kard<span class="text-slate-800 dark:text-white">.</span>
            </h1>
            <h2 class="text-center text-slate-600 dark:text-slate-400 text-sm mt-2">
                Recuperação de Senha
            </h2>

            <form id="forgot-password-form" class="mt-8 space-y-4" novalidate>
                <div>
                    <input 
                        type="email" 
                        id="email" 
                        name="email"
                        placeholder="seu@email.com" 
                        class="w-full px-4 py-3 border border-slate-300 dark:border-slate-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white dark:bg-slate-700 text-slate-900 dark:text-slate-100 transition-colors" 
                        required
                        aria-label="E-mail"
                        aria-describedby="email-error email-help">
                    <span id="email-help" class="text-xs text-slate-500 dark:text-slate-400 mt-1 block">Informe o e-mail vinculado à sua conta</span>
                    <span id="email-error" class="text-red-500 text-xs mt-1 hidden" role="alert"></span>
                </div>

                <button 
                    type="submit" 
                    class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-3 rounded-lg font-bold transition-all shadow-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2"
                    aria-label="Enviar link de recuperação">
                    Enviar Link de Recuperação
                </button>
            </form>

            <div 
                id="message" 
                class="text-sm mt-4 text-center hidden" 
                role="alert" 
                aria-live="polite"
                aria-atomic="true">
            </div>

            <footer class="mt-6 text-center border-t border-slate-200 dark:border-slate-700 pt-6">
                <p class="text-slate-500 dark:text-slate-400 text-sm">Lembrou sua senha?</p>
                <a 
                    href="login.html" 
                    class="text-indigo-600 dark:text-indigo-400 hover:underline font-bold text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 rounded">
                    Voltar para Login
                </a>
            </footer>
        </div>

        <div class="mt-4 text-center">
            <button id="theme-toggle" class="text-slate-600 dark:text-slate-400 hover:text-indigo-600 dark:hover:text-indigo-400 text-sm flex items-center gap-2 mx-auto" aria-label="Alternar tema">
                <span id="theme-icon">🌙</span>
                <span>Alternar Tema</span>
            </button>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/theme.js"></script>
</body>
</html>
