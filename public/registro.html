<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0">
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Crie sua conta no Kard e comece a organizar suas atividades e tarefas de forma inteligente. Registre-se gratuitamente agora.">
    <meta name="keywords" content="criar conta, registro, cadastro, kard, gerenciador de tarefas, organização, produtividade">
    <meta name="author" content="Kard">
    <meta name="robots" content="index, follow">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://kard-app.onrender.com/registro.html">
    <meta property="og:title" content="Kard - Crie sua conta | Gerenciador de Atividades">
    <meta property="og:description" content="Crie sua conta no Kard e comece a organizar suas atividades e tarefas de forma inteligente. Registre-se gratuitamente agora.">
    <meta property="og:locale" content="pt_BR">
    <meta property="og:site_name" content="Kard">
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://kard-app.onrender.com/registro.html">
    <meta name="twitter:title" content="Kard - Crie sua conta | Gerenciador de Atividades">
    <meta name="twitter:description" content="Crie sua conta no Kard e comece a organizar suas atividades e tarefas de forma inteligente. Registre-se gratuitamente agora.">
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://kard-app.onrender.com/registro.html">
    
    <title>Kard - Crie sua conta | Gerenciador de Atividades</title>
    <link href="css/style.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#4F46E5">
</head>
<body class="bg-gradient-to-br from-indigo-50 via-white to-purple-50 dark:from-slate-900 dark:via-slate-800 dark:to-slate-900 min-h-screen flex items-center justify-center p-4 transition-colors duration-300">
    <div class="w-full max-w-md">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-8 border border-slate-200 dark:border-slate-700 transition-colors duration-300">
            <header class="text-center mb-8">
                <h1 class="text-3xl font-bold text-indigo-600 dark:text-indigo-400" role="banner">Kard<span class="text-slate-800 dark:text-white">.</span></h1>
                <h2 class="text-slate-500 dark:text-slate-400 text-sm mt-2">Comece a organizar sua vida hoje.</h2>
            </header>

            <form id="register-form" class="space-y-4" novalidate aria-labelledby="form-title">
                <div class="sr-only" id="form-title">Formulário de Registro</div>
                
                <div>
                    <input type="text" id="reg-name" name="name" placeholder="Seu Nome" 
                        class="w-full px-4 py-3 border border-slate-300 dark:border-slate-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white dark:bg-slate-700 text-slate-900 dark:text-slate-100 transition-colors" 
                        required
                        aria-label="Nome completo"
                        aria-describedby="name-error">
                    <span id="name-error" class="text-red-500 text-xs mt-1 hidden" role="alert"></span>
                </div>

                <div>
                    <input type="email" id="reg-email" name="email" placeholder="seu@email.com" 
                        class="w-full px-4 py-3 border border-slate-300 dark:border-slate-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white dark:bg-slate-700 text-slate-900 dark:text-slate-100 transition-colors" 
                        required
                        aria-label="E-mail"
                        aria-describedby="email-error">
                    <span id="email-error" class="text-red-500 text-xs mt-1 hidden" role="alert"></span>
                </div>

                <div class="relative">
                    <input type="password" id="reg-password" name="password" placeholder="Crie uma Senha (mín. 6)"
                        class="w-full px-4 py-3 border border-slate-300 dark:border-slate-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white dark:bg-slate-700 text-slate-900 dark:text-slate-100 transition-colors pr-12" 
                        required
                        minlength="6"
                        aria-label="Senha"
                        aria-describedby="password-requirements password-error">
                    <button type="button" onclick="togglePass('reg-password', 'eye-icon-1')" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 rounded p-1" 
                        aria-label="Mostrar/Ocultar senha">
                        <span id="eye-icon-1">👁️</span>
                    </button>
                    <span id="password-requirements" class="sr-only">A senha deve ter no mínimo 6 caracteres</span>
                    <span id="password-error" class="text-red-500 text-xs mt-1 hidden" role="alert"></span>
                </div>

                <div class="relative">
                    <input type="password" id="reg-confirm" name="confirm-password" placeholder="Confirme sua Senha"
                        class="w-full px-4 py-3 border border-slate-300 dark:border-slate-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white dark:bg-slate-700 text-slate-900 dark:text-slate-100 transition-colors pr-12" 
                        required
                        aria-label="Confirmar senha"
                        aria-describedby="confirm-error">
                    <button type="button" onclick="togglePass('reg-confirm', 'eye-icon-2')" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 rounded p-1" 
                        aria-label="Mostrar/Ocultar confirmação de senha">
                        <span id="eye-icon-2">👁️</span>
                    </button>
                    <span id="confirm-error" class="text-red-500 text-xs mt-1 hidden" role="alert"></span>
                </div>

                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-3 rounded-lg font-bold transition-all shadow-md mt-2 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2" 
                    aria-label="Criar nova conta">
                    Criar Conta
                </button>
            </form>

            <div id="auth-msg" class="text-center text-sm mt-4 hidden" role="alert" aria-live="polite" aria-atomic="true"></div>

            <footer class="mt-6 text-center border-t border-slate-200 dark:border-slate-700 pt-6">
                <p class="text-slate-500 dark:text-slate-400 text-sm">Já tem uma conta?</p>
                <a href="login.html" class="text-indigo-600 dark:text-indigo-400 hover:underline font-bold text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 rounded" aria-label="Fazer login na sua conta">Fazer Login</a>
            </footer>
        </div>

        <div class="mt-4 text-center">
            <button id="theme-toggle-register" class="text-slate-600 dark:text-slate-400 hover:text-indigo-600 dark:hover:text-indigo-400 text-sm flex items-center gap-2 mx-auto" aria-label="Alternar tema">
                <span id="theme-icon-register">🌙</span>
                <span>Alternar Tema</span>
            </button>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/theme.js"></script>
    <script>
        function togglePass(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = '🙈';
            } else {
                input.type = 'password';
                icon.textContent = '👁️';
            }
        }
    </script>
</body>
</html>
