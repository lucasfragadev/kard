<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0">
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Faça login no Kard - Sistema inteligente de gerenciamento de atividades e tarefas.">
    <meta name="keywords" content="login, kard, gerenciador de tarefas, autenticação">
    <meta name="author" content="Kard">
    <meta name="robots" content="index, follow">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://kard.app/login.html">
    <meta property="og:title" content="Kard - Login | Gerenciador de Atividades">
    <meta property="og:description" content="Faça login no Kard e gerencie suas atividades de forma inteligente.">
    <meta property="og:image" content="https://kard.app/images/og-image.png">
    <meta property="og:locale" content="pt_BR">
    <meta property="og:site_name" content="Kard">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://kard.app/login.html">
    <meta property="twitter:title" content="Kard - Login | Gerenciador de Atividades">
    <meta property="twitter:description" content="Faça login no Kard e gerencie suas atividades de forma inteligente.">
    <meta property="twitter:image" content="https://kard.app/images/twitter-image.png">
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://kard.app/login.html">
    
    <title>Kard - Login | Gerenciador de Atividades</title>
    
    <link href="css/style.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100 dark:from-slate-900 dark:to-slate-800 min-h-screen flex items-center justify-center p-4 transition-colors duration-300">
    
    <div class="w-full max-w-md">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-8 border border-slate-200 dark:border-slate-700 transition-colors duration-300">
            
            <h1 class="text-3xl font-bold text-center text-indigo-600 dark:text-indigo-400" role="banner">
                Kard<span class="text-slate-800 dark:text-white">.</span>
            </h1>
            <h2 class="text-center text-slate-600 dark:text-slate-400 text-sm mt-2">
                Faça login na sua conta
            </h2>

            <form id="login-form" class="mt-8 space-y-5" novalidate aria-labelledby="form-title">
                <div class="sr-only" id="form-title">Formulário de Login</div>
                
                <div>
                    <label for="email" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">
                        E-mail
                    </label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email"
                        placeholder="seu@email.com" 
                        required
                        autocomplete="email"
                        aria-required="true"
                        aria-describedby="email-error email-help"
                        class="w-full px-4 py-3 rounded-lg bg-slate-50 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all"
                    >
                    <span id="email-error" class="text-red-500 text-xs mt-1 hidden" role="alert"></span>
                    <span id="email-help" class="text-xs text-slate-500 dark:text-slate-400 mt-1 block"></span>
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">
                        Senha
                    </label>
                    <div class="relative">
                        <input 
                            type="password" 
                            id="password" 
                            name="password"
                            placeholder="Digite sua senha" 
                            required
                            autocomplete="current-password"
                            aria-required="true"
                            aria-describedby="password-error"
                            minlength="6"
                            class="w-full px-4 py-3 rounded-lg bg-slate-50 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all"
                        >
                        <button 
                            type="button" 
                            onclick="togglePass('password', 'eye-icon-login')" 
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 rounded p-1"
                            aria-label="Mostrar/Ocultar senha"
                            tabindex="0">
                            <span id="eye-icon-login">👁️</span>
                        </button>
                    </div>
                    <span id="password-error" class="text-red-500 text-xs mt-1 hidden" role="alert"></span>
                </div>

                <button 
                    type="submit" 
                    class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-3 rounded-lg font-bold transition-all shadow-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2"
                    aria-label="Entrar na conta">
                    Entrar
                </button>
            </form>

            <div 
                id="error-msg" 
                class="text-red-500 dark:text-red-400 text-sm mt-4 text-center hidden" 
                role="alert" 
                aria-live="polite"
                aria-atomic="true">
            </div>

            <footer class="mt-6 text-center border-t border-slate-200 dark:border-slate-700 pt-6">
                <p class="text-slate-500 dark:text-slate-400 text-sm">Ainda não tem conta?</p>
                <a 
                    href="registro.html" 
                    class="text-indigo-600 dark:text-indigo-400 hover:underline font-bold text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 rounded"
                    aria-label="Criar nova conta grátis">
                    Criar conta grátis
                </a>
            </footer>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/theme.js"></script>
    <script>
        function togglePass(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = '🙈';
            } else {
                input.type = 'password';
                icon.textContent = '👁️';
            }
        }
    </script>
</body>
</html>
